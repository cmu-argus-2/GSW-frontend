version: '3.8'

services:
  influxdb:
    image: influxdb:2.7
    container_name: satellite_influxdb
    ports:
      - "${INFLUXDB_PORT:-8086}:8086"
    volumes:
      - influxdb-data:/var/lib/influxdb2
      - influxdb-config:/etc/influxdb2
    environment:
      - DOCKER_INFLUXDB_INIT_MODE=setup
      - DOCKER_INFLUXDB_INIT_USERNAME=${INFLUXDB_USERNAME:-admin}
      - DOCKER_INFLUXDB_INIT_PASSWORD=${INFLUXDB_PASSWORD:-satellite123}
      - DOCKER_INFLUXDB_INIT_ORG=${INFLUXDB_ORG:-satellite}
      - DOCKER_INFLUXDB_INIT_BUCKET=${INFLUXDB_BUCKET:-telemetry}
      - DOCKER_INFLUXDB_INIT_ADMIN_TOKEN=${INFLUXDB_TOKEN:-my-super-secret-auth-token}
    networks:
      - satellite-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8086/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  telemetry-ingest:
    build: ./ingest
    container_name: satellite_ingest
    ports:
      - "${INGEST_PORT:-5555}:5555"
    environment:
      - INFLUXDB_URL=http://influxdb:8086
      - INFLUXDB_TOKEN=${INFLUXDB_TOKEN:-my-super-secret-auth-token}
      - INFLUXDB_ORG=${INFLUXDB_ORG:-satellite}
      - INFLUXDB_BUCKET=${INFLUXDB_BUCKET:-telemetry}
      - SOCKET_HOST=0.0.0.0
      - SOCKET_PORT=5555
    depends_on:
      influxdb:
        condition: service_healthy
    networks:
      - satellite-network
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: satellite_grafana
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana-provisioning:/etc/grafana/provisioning
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-admin}
      - GF_INSTALL_PLUGINS=
    depends_on:
      - influxdb
    networks:
      - satellite-network

volumes:
  influxdb-data:
  influxdb-config:
  grafana-data:

networks:
  satellite-network:
    driver: bridge
