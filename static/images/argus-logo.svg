<svg viewBox="0 0 120 40" xmlns="http://www.w3.org/2000/svg">
  <!-- Satellite icon -->
  <g transform="translate(5, 5)">
    <!-- Main body -->
    <rect x="10" y="8" width="10" height="14" rx="1" fill="#3B82F6"/>
    <!-- Solar panels -->
    <rect x="0" y="10" width="8" height="10" rx="1" fill="#22D3EE"/>
    <rect x="22" y="10" width="8" height="10" rx="1" fill="#22D3EE"/>
    <!-- Antenna -->
    <line x1="15" y1="8" x2="15" y2="2" stroke="#E5E7EB" stroke-width="1.5"/>
    <circle cx="15" cy="1" r="1.5" fill="#22C55E"/>
    <!-- Panel lines -->
    <line x1="2" y1="15" x2="6" y2="15" stroke="#111827" stroke-width="0.5"/>
    <line x1="24" y1="15" x2="28" y2="15" stroke="#111827" stroke-width="0.5"/>
  </g>

  <!-- ARGUS text -->
  <text x="45" y="26" font-family="Inter, sans-serif" font-size="18" font-weight="700" fill="#E5E7EB">ARGUS</text>
</svg>
