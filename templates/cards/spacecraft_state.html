<div class="status-card" id="spacecraft-state-card">
    <div class="status-card-header">
        <span class="status-card-title">Spacecraft State</span>
        <span class="status-badge nominal" id="sc-state-badge">NOMINAL</span>
    </div>

    <div class="status-row">
        <span class="status-label">SC_STATE</span>
        <span class="status-value font-mono" id="sc-state-value">--</span>
    </div>

    <div class="status-row">
        <span class="status-label">ADCS Mode</span>
        <span class="status-value font-mono" id="adcs-mode-value">--</span>
    </div>

    <div class="status-row">
        <span class="status-label">GPS Fix</span>
        <span class="status-value font-mono" id="gps-fix-value">--</span>
    </div>

    <div class="status-row">
        <span class="status-label">Reboot Count</span>
        <span class="status-value font-mono" id="reboot-count-value">--</span>
    </div>

    <div class="status-row">
        <span class="status-label">Watchdog</span>
        <span class="status-value font-mono" id="watchdog-value">--</span>
    </div>
</div>
