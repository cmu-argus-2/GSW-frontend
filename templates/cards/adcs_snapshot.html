<div class="status-card" id="adcs-snapshot-card">
    <div class="status-card-header">
        <span class="status-card-title">ADCS</span>
        <span class="status-badge nominal" id="adcs-status-badge">NOMINAL</span>
    </div>

    <div class="status-row">
        <span class="status-label">Mode</span>
        <span class="status-value font-mono" id="adcs-mode-display">--</span>
    </div>

    <div class="status-row">
        <span class="status-label">Gyro (X,Y,Z)</span>
        <span class="status-value font-mono" id="gyro-xyz-value">--, --, --</span>
    </div>

    <div class="status-row">
        <span class="status-label">Gyro RMS</span>
        <span class="status-value font-mono" id="gyro-rms-value">-- rad/s</span>
    </div>

    <div class="status-row">
        <span class="status-label">Mag (X,Y,Z)</span>
        <span class="status-value font-mono" id="mag-xyz-value">--, --, --</span>
    </div>

    <div class="status-row">
        <span class="status-label">Sun Status</span>
        <span class="status-value font-mono" id="sun-status-value">--</span>
    </div>

    <div class="status-row">
        <span class="status-label">Sun Vector</span>
        <span class="status-value font-mono" id="sun-vec-value">--, --, --</span>
    </div>
</div>
