<div class="status-card" id="gps-snapshot-card">
    <div class="status-card-header">
        <span class="status-card-title">GPS</span>
        <span class="status-badge" id="gps-status-badge">--</span>
    </div>

    <div class="status-row">
        <span class="status-label">Fix Mode</span>
        <span class="status-value font-mono" id="gps-fix-mode-value">--</span>
    </div>

    <div class="status-row">
        <span class="status-label">Satellites</span>
        <span class="status-value font-mono" id="gps-sv-count-value">--</span>
    </div>

    <div class="status-row">
        <span class="status-label">Latitude</span>
        <span class="status-value font-mono" id="gps-lat-value">--</span>
    </div>

    <div class="status-row">
        <span class="status-label">Longitude</span>
        <span class="status-value font-mono" id="gps-lon-value">--</span>
    </div>

    <div class="status-row">
        <span class="status-label">Altitude</span>
        <span class="status-value font-mono" id="gps-alt-value">-- km</span>
    </div>

    <div class="status-row">
        <span class="status-label">GNSS Time</span>
        <span class="status-value font-mono" id="gps-gnss-time-value">--</span>
    </div>
</div>
