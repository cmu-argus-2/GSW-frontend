<div class="topbar">
    <!-- Left: Logo and Mission Name -->
    <div class="topbar-left">
        <svg class="topbar-logo" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
            <!-- Simple satellite icon -->
            <circle cx="20" cy="20" r="18" stroke="#3B82F6" stroke-width="2" fill="none"/>
            <circle cx="20" cy="20" r="6" fill="#3B82F6"/>
            <line x1="20" y1="2" x2="20" y2="10" stroke="#3B82F6" stroke-width="2"/>
            <line x1="20" y1="30" x2="20" y2="38" stroke="#3B82F6" stroke-width="2"/>
            <line x1="2" y1="20" x2="10" y2="20" stroke="#3B82F6" stroke-width="2"/>
            <line x1="30" y1="20" x2="38" y2="20" stroke="#3B82F6" stroke-width="2"/>
        </svg>
        <div>
            <div class="topbar-title">ARGUS-1</div>
            <div class="text-muted" style="font-size: 0.625rem; text-transform: uppercase; letter-spacing: 0.1em;">Mission Control</div>
        </div>
    </div>

    <!-- Center: Time Displays -->
    <div class="topbar-center">
        <!-- Mission Elapsed Time -->
        <div class="time-display">
            <div class="time-label">Mission Elapsed Time</div>
            <div class="time-value met" id="met-display">---:--:--:--</div>
        </div>

        <!-- Spacecraft Time -->
        <div class="time-display">
            <div class="time-label">Spacecraft Time (UTC)</div>
            <div class="time-value" id="sc-time-display">--:--:--</div>
        </div>

        <!-- Ground Time -->
        <div class="time-display">
            <div class="time-label">Ground Time (UTC)</div>
            <div class="time-value" id="ground-time-display">--:--:--</div>
        </div>
    </div>

    <!-- Right: Link Status and E-STOP -->
    <div class="topbar-right">
        <!-- Link Status -->
        <div class="link-status">
            <span class="status-dot" id="link-status-dot"></span>
            <div>
                <div class="link-label" id="link-status-text">NO LINK</div>
                <div class="link-age" id="link-age">Last: --</div>
            </div>
        </div>

        <!-- E-STOP Button -->
        <button class="btn btn-estop" id="estop-btn">E-STOP</button>
    </div>
</div>
