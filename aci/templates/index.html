<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Satellite Command Interface</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <h1>
            🛰️ Satellite Command Interface
            <div class="status-indicator">
                <div class="status-light inactive" id="gs-status-light"></div>
                <span class="status-text" id="gs-status-text">Ground Station: Offline</span>
            </div>
            <button id="config-btn" class="config-btn" title="Server Configuration">⚙️</button>
        </h1>
        
        <div class="zones">
            <!-- Command Builder Zone -->
            <div class="zone command-builder">
                <h2>Command Builder</h2>
                
                <div class="form-group">
                    <label for="command-input">Search Commands:</label>
                    <div class="command-search-wrapper">
                        <input type="text" id="command-input" placeholder="Type to search (e.g. 'set', 'get', 'ping')...">
                        <div id="command-suggestions-container" class="suggestions-container" style="display: none;">
                            <div id="command-suggestions"></div>
                        </div>
                    </div>
                </div>

                <div id="arguments-container" class="arguments-container">
                    <!-- Arguments will be dynamically added here -->
                </div>

                <button id="add-command-btn" disabled>Add to Queue</button>
                <div class="info-text" id="command-info"></div>
            </div>

            <!-- Command Queue Zone -->
            <div class="zone queue-zone">
                <h2>Command Queue</h2>
                <div id="command-queue">
                    <div class="empty-state">No commands in queue. Add a command to get started.</div>
                </div>
            </div>

            <!-- Packet Display Zone -->
            <div class="zone packet-zone">
                <h2>Last Received Packet</h2>
                <div id="packet-display">
                    <div class="no-packet">No packets received yet.</div>
                </div>
            </div>
        </div>

        <!-- Packet History Panel -->
        <div class="history-panel">
            <h2>Packet History</h2>
            <div id="packet-history" class="history-container">
                <div class="no-history">No packets received yet.</div>
            </div>
        </div>
    </div>

    <!-- Config Modal -->
    <div id="config-modal" class="modal" style="display: none;">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Server Configuration</h2>
                <button class="modal-close-btn" id="modal-close-btn">&times;</button>
            </div>
            
            <div class="modal-body">
                <div class="config-section">
                    <h3>XML-RPC Server Settings</h3>
                    
                    <div class="config-input-group">
                        <label for="server-ip">Server IP:</label>
                        <input type="text" id="server-ip" placeholder="e.g. 172.20.70.133">
                    </div>
                    
                    <div class="config-input-group">
                        <label for="server-port">Server Port:</label>
                        <input type="text" id="server-port" placeholder="e.g. 8000">
                    </div>
                    
                    <button id="update-server-btn" class="config-update-btn">Update Server</button>
                </div>
            </div>
            
            <div class="modal-footer">
                <button id="start-server-btn" class="server-control-btn start-btn">▶ Start Server</button>
                <button id="stop-server-btn" class="server-control-btn stop-btn">⏹ Stop Server</button>
                <button id="restart-server-btn" class="server-control-btn restart-btn">🔄 Restart Server</button>
            </div>
        </div>
    </div>

    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
